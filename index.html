<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Factory Kanban - Smart Task Management</title>
    <meta name="description" content="看板方式でタスクを管理する高度なAIファクトリーツール。">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <!-- Auth Lock Screen -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <div class="rivet-tl"></div><div class="rivet-tr"></div>
            <div class="rivet-bl"></div><div class="rivet-br"></div>
            <h2 class="auth-title">システム認証</h2>
            <input type="password" id="auth-pass" placeholder="PASSWORD..." autofocus>
            <button onclick="handleAuth()">ENTER</button>
            <p id="auth-error" style="color: #ff7675; margin-top: 15px; font-weight: bold; display: none;">ACCESS DENIED</p>
        </div>
    </div>

    <div id="auto-scale-wrapper" style="visibility: hidden;">
        <h1 class="main-title-pop">
            TO DOリスト
            <span class="rivet-tl"></span>
            <span class="rivet-tr"></span>
            <span class="rivet-bl"></span>
            <span class="rivet-br"></span>
        </h1>
        <header class="header-area">
            <div id="system-message" class="system-message-card" style="position: relative; display: flex; align-items: center; gap: 20px;">
                <div class="worker-selector-wrapper">
                    <label style="font-size: 0.8rem; font-weight: 900; display: block; margin-bottom: 5px;">現在の作業者</label>
                    <select id="worker-select" onchange="handleWorkerChange()" style="padding: 8px 15px; border: 3px solid var(--text-main); border-radius: 12px; font-weight: 900; background: white; cursor: pointer; min-width: 150px;">
                        <!-- Workers will be populated here -->
                    </select>
                </div>
                <div style="flex: 1; min-width: 0;">
                    <h1 style="font-size: 1rem; margin-bottom: 5px; color: var(--text-main); opacity: 0.7;">システムログ (依頼内容の履歴、直近6件)</h1>
                    <ul id="msg-list" style="list-style: none; padding: 0; margin: 0; font-size: 0.8rem; min-height: 100px; height: auto;">
                        <!-- Messages will appear here -->
                    </ul>
                </div>
                <div class="header-actions" style="display: flex; flex-direction: column; gap: 5px;">
                    <div style="position: relative;">
                        <button class="add-task-header-btn" onclick="openLogHistory()" style="background: #f0f0f0; color: #333; font-size: 0.75rem; padding: 5px 10px; width: 100%;">ログ履歴</button>
                        <span id="log-count-badge" class="log-badge" style="display: none;">0</span>
                    </div>
                    <button class="add-task-header-btn" id="full-view-btn" onclick="toggleAutoScale()" style="background: #e7f3ff; color: #004085; font-size: 0.75rem; padding: 5px 10px;">フィット切替</button>
                </div>
            </div>
        </header>

        <main id="kanban-view" class="kanban-container">
            <!-- To Do Column -->
            <section class="column column-todo" id="col-todo">
                <div class="column-header">
                    <div class="header-left">
                        <h2 class="column-title">TO DO</h2>
                        <span class="task-count" id="count-todo">0</span>
                    </div>
                    <div class="header-actions">
                        <button class="add-task-header-btn" onclick="openModal('todo')">タスク追加</button>
                        <button class="add-task-header-btn" onclick="openModal('todo', null, true)" style="background: #e3f2fd; color: #004085; border-color: #004085; margin-left: 5px;">定期追加</button>
                        <button class="add-task-header-btn" onclick="openModal('todo', null, false, true)" style="background: var(--accent-green); color: white; border-color: #2d6a4f; margin-left: 5px;">依頼</button>
                    </div>
                </div>
                <div class="task-list" id="list-todo"></div>
            </section>

            <!-- Progress Column -->
            <section class="column column-progress" id="col-progress">
                <div class="column-header">
                    <div class="header-left">
                        <h2 class="column-title">TO DO 処理中</h2>
                        <span class="task-count" id="count-progress">0</span>
                    </div>
                </div>
                <div class="task-list" id="list-progress"></div>
            </section>

            <!-- Done Column -->
            <section class="column column-done" id="col-done">
                <div class="column-header">
                    <div class="header-left">
                        <h2 class="column-title">TO DO 処理済</h2>
                        <span class="task-count" id="count-done">0</span>
                    </div>
                    <button class="add-task-header-btn" onclick="toggleHistory(true)" style="background: white; font-size: 0.75rem; padding: 5px 10px;">過去の履歴</button>
                </div>
                <div class="task-list" id="list-done"></div>
            </section>
        </main>

        <main id="history-view" class="kanban-container" style="display: none; grid-template-columns: 1fr;">
            <section class="column" style="width: 100%; max-width: 800px; margin: 0 auto;">
                <div class="column-header">
                    <div class="header-left">
                        <h2 class="column-title">完了タスクの履歴</h2>
                        <button class="header-action-btn" onclick="clearAllHistory()" title="全履歴を消去" style="border-color: var(--accent-red); color: var(--accent-red); margin-left:10px;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    </div>
                    <button class="add-task-header-btn" onclick="toggleHistory(false)">← ボードに戻る</button>
                </div>
                <div class="task-list" id="history-list-full"></div>
            </section>
        </main>
    </div>

    <!-- Task Detail Modal (New/Edit) -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-header" id="modal-title">タスクの詳細</h2>
            <input type="hidden" id="edit-task-id">
            
            <div class="form-group">
                <label>看板表示内容 (タイトル)</label>
                <input type="text" id="task-title" placeholder="看板に表示される短い名前">
            </div>

            <div class="form-group">
                <label>具体的詳細</label>
                <textarea id="task-desc" placeholder="このタスクの詳しい内容を入力してください..."></textarea>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>優先度</label>
                    <select id="task-priority">
                        <option value="low">小 (白)</option>
                        <option value="medium">中 (薄黄)</option>
                        <option value="high">高 (ピンク)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>期限設定</label>
                    <input type="datetime-local" id="task-deadline">
                </div>
            </div>

            <div class="form-group" style="padding: 10px; background: #e7f3ff; border-radius: 15px; border: 2px dashed #004085;">
                <label style="display: flex; align-items: center; cursor: pointer; margin-bottom: 0;">
                    <input type="checkbox" id="task-recurring" style="width: 20px; height: 20px; margin-right: 10px;">
                    <span style="color: #004085; font-weight: 900;">毎月自動でTO DOに補充する</span>
                </label>
            </div>

            <div id="worker-selection-area" style="margin-top: 15px; display: none;">
                <label style="display: block; font-weight: 900; margin-bottom: 8px; color: var(--text-main);">担当作業者を選択（複数可）</label>
                <div id="modal-worker-list" style="display: flex; flex-direction: column; gap: 5px; max-height: 180px; overflow-y: auto; padding: 10px; border: 3px solid var(--text-main); border-radius: 15px; background: white;">
                    <!-- Worker checkboxes will appear here -->
                </div>
            </div>

            <div class="modal-actions" style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button id="reject-btn" class="add-task-header-btn" style="background: var(--accent-red); color: white; display: none;" onclick="rejectTask()">拒否</button>
                <div style="flex: 1;"></div>
                <button class="add-task-header-btn" style="background: white;" onclick="closeModal()">キャンセル</button>
                <button class="add-task-header-btn" onclick="saveTask()">保存</button>
            </div>
        </div>
    </div>

    <!-- Log History Modal -->
    <div id="log-history-overlay" class="modal-overlay">
        <div class="modal" style="max-width: 600px;">
            <h2 style="margin-bottom: 15px; border-bottom: 5px solid var(--accent-blue); display: inline-block;">全依頼ログ履歴</h2>
            <div id="full-log-list" style="max-height: 50vh; overflow-y: auto; padding: 15px; border: 3px solid var(--text-main); border-radius: 15px; background: white;">
                <!-- Full logs will appear here -->
            </div>
            <div class="modal-actions" style="margin-top: 20px; text-align: right;">
                <button class="add-task-header-btn" style="background: white;" onclick="closeLogHistory()">閉じる</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script src="script.js"></script>
</body>
</html>
